# values-minio.yaml

components:
  minio:
    enabled: true
    name: minio
    namespace: mlops
    replicas: 1
    image: minio/minio
    args:
      - server
      - /data
      - "--console-address"
      - ":9001"
    env:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      api: 9000        # MinIO API
      console: 9001    # MinIO Web UI
    serviceType: ClusterIP   # internal service
    volumeMounts:
      - name: data
        mountPath: /data
    volumes:
      - name: data
        emptyDir: {}      
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: minio.local
          port: 9001     # Web UI
        - host: minio-api.local
          port: 9000 
