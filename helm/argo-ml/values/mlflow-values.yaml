components:
  mlflow:
    enabled: true
    name: mlflow
    namespace: mlops
    replicas: 1
    image: mlflow-local:v2
    command: ["mlflow"]
    args:
      - "server"
      - "--backend-store-uri=sqlite:///mlflow.db"
      - "--default-artifact-root=s3://mlflow/"
      - "--host=0.0.0.0"
      - "--port=5000"
      - "--allowed-hosts=mlflow.local"
        #      - "--allowed-hosts=*"
    env:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
        #      MLFLOW_S3_ENDPOINT_URL: http://minio.mlops.svc.cluster.local:9000
      MLFLOW_S3_ENDPOINT_URL: http://minio.local
      AWS_S3_FORCE_PATH_STYLE: "true"
    ports:
      web: 5000
    serviceType: ClusterIP
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: mlflow.local
          port: 5000
