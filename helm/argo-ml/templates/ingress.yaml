{{- range $key, $component := .Values.components }}
{{- if and $component.ingress $component.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $component.name | default $key }}-ingress
  namespace: {{ $component.namespace | default "mlops" }}
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: {{ $component.ingress.className | default "nginx" }}
  rules:
  {{- range $component.ingress.hosts }}
    - host: {{ .host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ $component.name | default $key }}
                port:
                  number: {{ .port }}
  {{- end }}
{{- end }}
{{- end }}
