name: Build and Push Model API Image

on:
  push:
    paths:
      - "model-api/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 🔥 Получаем последний тег
      - name: Get latest version
        id: version
        run: |
          REPO="${{ secrets.DOCKERHUB_USERNAME }}/model-api"

          TAGS=$(curl -s https://hub.docker.com/v2/repositories/$REPO/tags?page_size=100 | jq -r '.results[].name')

          VERSION=$(echo "$TAGS" | grep -E '^v[0-9]+$' | sed 's/v//' | sort -n | tail -1)

          if [ -z "$VERSION" ]; then
            NEXT=1
          else
            NEXT=$((VERSION+1))
          fi

          echo "VERSION=v$NEXT"
          echo "VERSION=v$NEXT" >> $GITHUB_ENV

      # 🐳 Build & Push
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./model-api
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/model-api:${{ env.VERSION }}
            ${{ secrets.DOCKERHUB_USERNAME }}/model-api:latest
